version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: contasys_postgres

    restart: always

    environment:
      POSTGRES_DB: contasys_db
      POSTGRES_USER: contasys_user
      POSTGRES_PASSWORD: 123456

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - contasys_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: contasys_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@contasys.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - contasys_network

  sonarqube:
    image: sonarqube:lts-community
    container_name: contasys_sonarqube

    restart: always

    ports:
      - "9000:9000"

    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true

    networks:
      - contasys_network

volumes:
  postgres_data:

networks:
  contasys_network: